workflows:
  android-workflow:
    name: Android Workflow
    max_build_duration: 30
    environment:
      flutter: stable
    scripts:
      - name: Generate platform folders
        script: |
          flutter create --platforms=android --project-name=pistachio_vpn .
      - name: Get packages
        script: |
          flutter pub get
      - name: Build APK
        script: |
          flutter build apk --release
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
